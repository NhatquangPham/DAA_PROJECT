name: CI — Tests & Quality Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install package in development mode
        run: pip install -e .

      - name: Run unit tests with coverage
        run: |
          pytest tests/ -v \
            --tb=short \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -x

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: coverage.xml
          fail_ci_if_error: false

  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install flake8 black isort

      - name: Check code formatting (black)
        run: black --check --diff src/ tests/ experiments/
        continue-on-error: true

      - name: Check import order (isort)
        run: isort --check-only --diff src/ tests/ experiments/
        continue-on-error: true

      - name: Lint with flake8
        run: |
          flake8 src/ tests/ experiments/ \
            --max-line-length=100 \
            --extend-ignore=E203,W503 \
            --statistics
        continue-on-error: true

  smoke-test:
    name: Smoke Test — Quick Experiment
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Run quick smoke test
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from src.problem.generator import generate_random_instance
          from src.algorithms.pso import PSOScheduler, PSOConfig
          from src.algorithms.ga import GAScheduler, GAConfig
          from src.algorithms.greedy import GreedyScheduler

          inst = generate_random_instance(6, 3, seed=42)
          pso = PSOScheduler(inst, PSOConfig(n_particles=10, max_iter=30, seed=42)).run()
          ga = GAScheduler(inst, GAConfig(pop_size=20, generations=30, seed=42)).run()
          greedy = GreedyScheduler(inst, 'LPT').run()

          print(f'PSO    makespan={pso.best_makespan:.0f}  time={pso.elapsed_time:.3f}s')
          print(f'GA     makespan={ga.best_makespan:.0f}  time={ga.elapsed_time:.3f}s')
          print(f'Greedy makespan={greedy.best_makespan:.0f}  time={greedy.elapsed_time:.4f}s')
          print('✅ Smoke test passed!')
          "
